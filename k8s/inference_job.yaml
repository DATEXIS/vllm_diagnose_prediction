apiVersion: batch/v1
kind: Job
metadata:
  name: diagnose-prediction-client
spec:
  template:
    spec:
      containers:
        - name: inference-client
          # Replace with your Docker image containing the code and dependencies
          image: your-registry/vllm_diagnose_prediction:latest 
          command: ["python3", "-u", "src/main.py", "--config", "configs/config.yaml"]
          resources:
            limits:
              memory: "16Gi"
              cpu: "4"
            requests:
              memory: "4Gi"
              cpu: "1"
          volumeMounts:
            - name: data-volume
              mountPath: /data
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: data-volume # Ensure this PVC has the patient dataset
      restartPolicy: Never
  backoffLimit: 0
