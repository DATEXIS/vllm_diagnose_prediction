# vLLM diagnose prediction - Experiment configuration
# Changed per experiment/run (no server rebuild required for most params)

# Run identification
job_name: "test-run"
run_name: "qwen8b-guided-decoding"

# Logging level
log_level: "INFO"

# Inference parameters
inference:
  temperature: 0.2
  max_tokens: 2000
  concurrency: 10
  guided_decoding: True

# Dataset configuration
data:
  patients_file: "data/mimic/patients_1411.pq"
  target_col: "ICD_CODES"
  sample_size: 100

# Model configuration
model:
  name: "Qwen/Qwen3-8B"
  max_model_len: 16384
  max_num_seqs: 256
  max_num_batched_tokens: 2048
  enable_chunked_prefill: true

# Kubernetes cluster configuration
k8s:
  namespace: "jfrick"
  image_pull_secrets: "private-registry-auth"

  server:
    gpu_count: 1
    gpu_type: "a100"
    memory_limit: "64Gi"
    memory_request: "16Gi"

  client:
    memory_limit: "16Gi"
    memory_request: "4Gi"

# MERLIN 2 configuration
merlin2:
  enabled: false
  sim_threshold: 0.7
  fpr_threshold: 0.1
  fnr_threshold: 0.1
  max_tokens_budget: 512
  max_iterations: 5
  convergence_threshold: 0.95

# Meta-Verifier configuration (for instruction generation)
meta_verifier:
  enabled: false  # Enable to generate contrastive instructions from results
  embedding_model: "microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract"  # Model for semantic embeddings
  min_error_count: 3  # Min errors before generating an instruction
  efficacy_threshold: 0.1  # Min efficacy score for instructions
  upload_results: true  # Upload generated instructions to wandb
  download_run_name: null  # Download instructions from previous run (null = none)