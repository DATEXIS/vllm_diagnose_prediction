# vLLM diagnose prediction configuration

# The job_name is used to name the Kubernetes pods and services
job_name: "test-run"

# Docker configuration for building and pushing images
docker:
  registry: "registry.datexis.com/jfrick"
  image_name: "vllm_diagnose_prediction"
  tag: "latest"
  platform: "linux/amd64" # Crucial for Mac M1/M2/M3 users
  server_image: "vllm/vllm-openai:v0.12.0" # Use latest stable for Qwen3 support

# Dataset configuration
data:
  # Path to the patients parquet file relative to the project root
  # Note: This file will be baked into the Docker image
  patients_file: "data/mimic/patients_1411.pq"
  
  # Target column we want to predict (e.g. 'ICD_CODES', 'disease')
  target_col: "ICD_CODES"
  
  # Maximum number of patients to process (set to null to process all)
  sample_size: 100

# Model configuration
model:
  name: "Qwen/Qwen3-8B"
  max_model_len: 16384
  max_num_seqs: 256
  max_num_batched_tokens: 2048
  enable_chunked_prefill: true

# Inference parameters
inference:
  temperature: 0.2
  max_tokens: 2000
  concurrency: 10
  guided_decoding: true # Uses JSON schema for structured ICD extraction

# Kubernetes cluster configuration
k8s:
  namespace: "jfrick"
  image_pull_secrets: "private-registry-auth" # Secret name for pull access to your registry
  
  # Resource requirements for the vLLM server
  server:
    gpu_count: 1
    gpu_type: "a100" # Label used in nodeSelector
    memory_limit: "64Gi"
    memory_request: "16Gi"
    
  # Resource requirements for the inference client job
  client:
    memory_limit: "16Gi"
    memory_request: "4Gi"
